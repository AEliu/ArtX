  <circle cx="78" cy="54" r="8" fill="#f59e0b"/>
  <circle cx="102" cy="54" r="8" fill="#22c55e"/>
  <text x="130" y="60" fill="#cbd5e1" font-size="22" font-family="SFMono-Regular, Consolas, monospace">large artwork safety path</text>

  <g font-family="SFMono-Regular, Consolas, monospace" font-size="20" fill="#e2e8f0">
    <text x="48" y="110">$ uv run googleart-download "bgEuwDxel93-Pg" -o downloads --workers 32</text>
    <text x="48" y="150" fill="#93c5fd">• Output: downloads/The Starry Night - Vincent van Gogh.tif</text>
