<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Large image TIFF output preview</title>
  <desc id="desc">Terminal-style preview showing a large artwork switching to TIFF BigTIFF output with cached tile reuse.</desc>
