    <text x="48" y="294" fill="#fbbf24">• Large artwork output adjusted to TIFF for streaming stitch safety</text>
    <text x="48" y="330" fill="#93c5fd">• Reusing 6072 cached tile(s)</text>
    <text x="48" y="366" fill="#93c5fd">• Stitch backend selected: bigtiff</text>
  </g>

